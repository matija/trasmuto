name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Verify version consistency
        run: |
          TAG="${{ github.ref_name }}"
          TAG_VERSION="${TAG#v}"
          CONF_VERSION=$(jq -r '.version' src-tauri/tauri.conf.json)
          CARGO_VERSION=$(grep '^version' src-tauri/Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          if [ "$CONF_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag $TAG does not match app version $CONF_VERSION in tauri.conf.json"
            exit 1
          fi
          if [ "$CARGO_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag $TAG does not match app version $CARGO_VERSION in Cargo.toml"
            exit 1
          fi

      - name: Detect prerelease
        id: check_prerelease
        run: |
          if [[ "${{ github.ref_name }}" =~ -(beta|alpha|rc) ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and release
        id: tauri_build
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Code signing secrets — optional; build is unsigned without them
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Trasmuto ${{ github.ref_name }}'
          releaseBody: 'See the assets below to download this version.'
          releaseDraft: false
          prerelease: ${{ steps.check_prerelease.outputs.prerelease }}
          includeDebug: false

      - name: Mark release draft on failure
        if: failure()
        run: |
          gh release edit "${{ github.ref_name }}" --draft=true || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
